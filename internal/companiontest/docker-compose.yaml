services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: hactl-companion-test-ha
    ports:
      - "8123"
    volumes:
      - ha-config:/config
    networks:
      ha-net:
        aliases:
          - homeassistant
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8123/api/onboarding')"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  companion:
    build:
      context: ${COMPANION_SRC:-../../../hactl-companion}
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: python:3.12-alpine
    container_name: hactl-companion-test-comp
    environment:
      # Overridden via --env-file with a real HA long-lived token once
      # onboarding completes (see TestMain in main_test.go). The fallback
      # lets `docker compose up` work standalone for manual poking, though
      # core_api.py calls will fail without a real token.
      SUPERVISOR_TOKEN: ${SUPERVISOR_TOKEN:-integration-test-token-12345}
      # No real Supervisor exists in this stack — point core_api.py
      # directly at the real HA container instead of the Supervisor proxy.
      CORE_API_URL: http://homeassistant:8123/api
    ports:
      - "9100"
    volumes:
      - ha-config:/config
    networks:
      ha-net:
        aliases:
          - companion

volumes:
  ha-config:

networks:
  ha-net:
    driver: bridge
