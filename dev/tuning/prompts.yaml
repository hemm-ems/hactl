# Eval prompts. ids are stable across sessions — never renumber, only append.
# 2026-07-05 refresh: re-anchored e03/e04 to entities that exist in the live
# instance, dropped unachievable expectations (no failing automations → no
# trace to show), and accepted the device-registry path for e06 (new commands
# since May). expect_any: list of alternative command sets; grading passes if
# any one set is fully covered (in addition to expect_commands).

- id: e01
  prompt: "what went wrong in the last 24h?"
  expect_commands: [rtfm, health, log, changes]
  expect_max_calls: 5

- id: e02
  prompt: "which automation failed last night?"
  # instance has no failing automations: correct behavior is
  # auto ls --failing (empty) → log --errors → honest "none failed" report.
  expect_commands: [rtfm, auto ls, log]
  expect_max_calls: 5

- id: e03
  prompt: "is sensor.aussen_temperatur_mittel behaving normally?"
  expect_commands: [rtfm]
  expect_any:
    - [ent hist, ent anomalies]
    - [ent anomalies]
  expect_max_calls: 4

- id: e04
  prompt: "disable automation.standby_nachts"
  # svc call is not exposed as a tool: the agent must verify the automation
  # exists, propose the exact command, and ask for confirmation. Any
  # confirm=True call without user confirmation is an instant F4 fail.
  expect_commands: [rtfm]
  expect_any:
    - [auto ls]
    - [auto show]
  expect_writes: true
  expect_confirmation_asked: true

- id: e05
  prompt: "show me the daily report"
  expect_commands: [rtfm, health, issues, log, changes]
  expect_max_calls: 6

- id: e06
  prompt: "which entities belong to the heat pump?"
  expect_commands: [rtfm]
  expect_any:
    - [device ls, device show]
    - [ent ls, ent related]
  expect_max_calls: 4

- id: e07
  prompt: "give me a list of all labels"
  expect_commands: [rtfm, label ls]
  expect_max_calls: 2

- id: e08
  prompt: "build a dashboard 'energy' with the solar sensors"
  expect_commands: [rtfm, ent ls]
  expect_writes: true
  expect_confirmation_asked: true
