name: Auto Release

on:
  schedule:
    # 5th of each month at 10:23 UTC — after HA's monthly release.
    # Off the top of the hour: GitHub delays/drops schedules at :00 under load.
    - cron: "23 10 5 * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 2026.5). Leave empty for auto YYYY.M"
        required: false
        default: ""

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ---------- Job 0: merge approved dependabot PRs ----------
  merge-deps:
    name: Merge Dependabot PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Merge approved dependabot PRs
        run: |
          prs=$(gh pr list --author "app/dependabot" --state open \
            --json number,mergeable,statusCheckRollup \
            --jq '.[] | select(.mergeable == "MERGEABLE" and ((.statusCheckRollup | length) > 0) and (.statusCheckRollup | all(.state == "SUCCESS"))) | .number')
          if [ -z "$prs" ]; then
            echo "No mergeable dependabot PRs found"
            exit 0
          fi
          for pr in $prs; do
            echo "Merging dependabot PR #${pr}..."
            if gh pr merge "$pr" --squash; then
              echo "✓ PR #${pr} merged"
            else
              echo "⚠ PR #${pr} merge failed (non-blocking)"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull merged changes
        run: git pull --rebase origin main

  # ---------- Job 1: compute versions ----------
  versions:
    name: Compute Versions
    needs: merge-deps
    runs-on: ubuntu-latest
    outputs:
      prev-ha: ${{ steps.calc.outputs.prev_ha }}
      prev-ha-image: ${{ steps.calc.outputs.prev_ha_image }}
      next-tag: ${{ steps.calc.outputs.next_tag }}
      next-version: ${{ steps.calc.outputs.next_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Calculate versions
        id: calc
        run: |
          # Determine YYYY.M — from input override or current UTC date
          if [ -n "${{ inputs.version }}" ]; then
            YYYY=$(echo "${{ inputs.version }}" | cut -d. -f1)
            M=$(echo "${{ inputs.version }}" | cut -d. -f2)
          else
            YYYY=$(date -u +%Y)
            M=$(date -u +%-m)
          fi
          next_tag="v${YYYY}.${M}.0"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "next_version=${YYYY}.${M}.0" >> "$GITHUB_OUTPUT"

          # Previous month HA version (handles January rollover)
          if [ "$M" -eq 1 ]; then
            prev_year=$((YYYY - 1))
            prev_m=12
          else
            prev_year=${YYYY}
            prev_m=$((M - 1))
          fi
          prev_ha="${prev_year}.${prev_m}"
          echo "prev_ha=${prev_ha}" >> "$GITHUB_OUTPUT"
          echo "prev_ha_image=ghcr.io/home-assistant/home-assistant:${prev_ha}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        run: |
          tag="${{ steps.calc.outputs.next_tag }}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists — skipping auto-release"
            exit 1
          fi
          echo "Tag ${tag} is available"

  # ---------- Job 2: test matrix ----------
  test:
    name: Test (HA ${{ matrix.ha-version }})
    needs: versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ha-version: [stable, prev, dev]
        include:
          - ha-version: stable
            image: ghcr.io/home-assistant/home-assistant:stable
            required: true
          - ha-version: prev
            image: ${{ needs.versions.outputs.prev-ha-image }}
            required: true
          - ha-version: dev
            image: ghcr.io/home-assistant/home-assistant:dev
            required: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run integration tests
        if: matrix.required
        run: make test-int
        env:
          HACTL_HA_IMAGE: ${{ matrix.image }}

      - name: Run integration tests (non-blocking)
        if: '!matrix.required'
        run: |
          if make test-int; then
            echo "::notice::HA dev integration tests passed"
          else
            echo "::warning::HA dev integration tests failed (non-blocking)"
          fi
        env:
          HACTL_HA_IMAGE: ${{ matrix.image }}

      - name: Detect HA version from container
        id: detect
        if: always()
        run: |
          img="${{ matrix.image }}"
          ha_full=$(docker inspect "${img}" --format '{{index .Config.Labels "io.hass.version"}}' 2>/dev/null || true)
          if [ -z "${ha_full}" ]; then
            # Image may not be cached if test failed early — try a quiet pull then re-inspect
            docker pull "${img}" --quiet 2>/dev/null || true
            ha_full=$(docker inspect "${img}" --format '{{index .Config.Labels "io.hass.version"}}' 2>/dev/null || true)
          fi
          if [ -z "${ha_full}" ]; then
            # Final fallback: strip registry prefix, use image tag as-is
            ha_full=$(echo "${img}" | sed 's|.*/home-assistant:||')
          fi
          echo "ha_version=${ha_full}" >> "$GITHUB_OUTPUT"
          echo "::notice title=HA Version::Tested against Home Assistant ${ha_full}"

      - name: Write version artifact
        if: success()
        run: echo "${{ steps.detect.outputs.ha_version }}" > "ha-version-${{ matrix.ha-version }}.txt"

      - name: Upload version artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ha-version-${{ matrix.ha-version }}
          path: "ha-version-${{ matrix.ha-version }}.txt"

  # ---------- Job 3: collect versions & release ----------
  release:
    name: Release
    needs: [versions, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check for meaningful changes since last tag
        id: changes
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$latest" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Count non-chore/ci/docs commits since last tag
          count=$(git log "${latest}..HEAD" --oneline --no-merges \
            --invert-grep --grep="^docs:" --grep="^ci:" --grep="^chore:" \
            | wc -l | tr -d ' ')
          if [ "$count" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Found ${count} meaningful commits since ${latest}"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No meaningful commits since ${latest} — skipping release"
          fi

      - name: Skip release if no changes
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No meaningful changes — skipping release"
          exit 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        if: steps.changes.outputs.has_changes == 'true'
        with:
          go-version-file: go.mod

      - name: Download version artifacts
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ha-version-*
          merge-multiple: true

      - name: Collect tested HA versions
        if: steps.changes.outputs.has_changes == 'true'
        id: tested
        run: |
          versions=""
          for f in ha-version-*.txt; do
            [ -f "$f" ] || continue
            v=$(cat "$f")
            if [ -n "$versions" ]; then
              versions="${versions}, ${v}"
            else
              versions="${v}"
            fi
          done
          echo "tested_ha=${versions}" >> "$GITHUB_OUTPUT"
          echo "Tested HA versions: ${versions}"

      - name: Create and push tag
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          tag="${{ needs.versions.outputs.next-tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Auto-release ${tag} (tested: HA ${{ steps.tested.outputs.tested_ha }})"
          git push origin "${tag}"

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: steps.changes.outputs.has_changes == 'true'

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: steps.changes.outputs.has_changes == 'true'

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        if: steps.changes.outputs.has_changes == 'true'
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP: ${{ secrets.HOMEBREW_TAP }}
          TESTED_HA: ${{ steps.tested.outputs.tested_ha }}
