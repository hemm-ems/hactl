name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.4

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: make test
      - name: Check coverage threshold
        run: |
          pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${pct}%"
          if awk "BEGIN{exit !($pct < 35)}"; then
            echo "::error::Coverage ${pct}% is below 35% threshold"
            exit 1
          fi

  test-integration:
    name: Integration Tests (HA ${{ matrix.ha-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        ha-version: [stable, prev, dev]
        include:
          - ha-version: stable
            image: ghcr.io/home-assistant/home-assistant:stable
            required: true
          - ha-version: prev
            image: ""  # computed below
            required: true
          - ha-version: dev
            image: ghcr.io/home-assistant/home-assistant:dev
            required: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Compute previous HA version
        if: matrix.ha-version == 'prev'
        id: prev
        run: |
          M=$(date -u +%-m)
          YYYY=$(date -u +%Y)
          if [ "$M" -eq 1 ]; then prev_year=$((YYYY-1)); prev_m=12
          else prev_year=${YYYY}; prev_m=$((M-1)); fi
          prev_month="${prev_year}.${prev_m}"
          echo "image=ghcr.io/home-assistant/home-assistant:${prev_month}" >> "$GITHUB_OUTPUT"
      - name: Set HA image
        id: image
        run: |
          img="${{ matrix.image }}"
          if [ -z "$img" ]; then
            img="${{ steps.prev.outputs.image }}"
          fi
          echo "ha_image=${img}" >> "$GITHUB_OUTPUT"
      - name: Run integration tests
        if: matrix.required
        run: make test-int
        env:
          HACTL_HA_IMAGE: ${{ steps.image.outputs.ha_image }}
      - name: Run integration tests (non-blocking)
        if: '!matrix.required'
        run: |
          if make test-int; then
            echo "::notice::HA dev integration tests passed"
          else
            echo "::warning::HA dev integration tests failed (non-blocking)"
          fi
        env:
          HACTL_HA_IMAGE: ${{ steps.image.outputs.ha_image }}

      - name: Detect HA version
        if: always()
        run: |
          img="${{ steps.image.outputs.ha_image }}"
          ha_full=$(docker inspect "${img}" --format '{{index .Config.Labels "io.hass.version"}}' 2>/dev/null || true)
          if [ -z "${ha_full}" ]; then
            ha_full=$(echo "${img}" | sed 's|.*/home-assistant:||')
          fi
          echo "::notice title=HA Version (${img##*:})::Home Assistant ${ha_full}"

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: govulncheck ./...

  test-companion:
    name: Companion Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Check out hactl-companion for local Docker build
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: hemm-ems/hactl-companion
          path: companion-src
      - name: Check vendored companion spec for drift
        run: make check-spec-drift COMPANION_DIR=companion-src
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run companion tests
        run: go test -tags=companion -v -count=1 -timeout 300s ./internal/companiontest/...
        env:
          COMPANION_SRC: ${{ github.workspace }}/companion-src

  test-discovery:
    name: Discovery Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Check out hactl-companion for local Docker build
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: hemm-ems/hactl-companion
          path: companion-src
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run discovery tests
        run: go test -tags=companion_discovery -v -count=1 -timeout 300s ./internal/companiontest_discovery/...
        env:
          COMPANION_SRC: ${{ github.workspace }}/companion-src

  # ---------------------------------------------------------------------------
  # gates — the single required check.
  #
  # Every job below that starts a real Home Assistant container is mandatory.
  # This aggregator exists so branch protection can require ONE check that
  # cannot be satisfied while a Docker tier is skipped, cancelled or silently
  # absent: a skipped `needs` job leaves result != 'success' and fails here.
  #
  # The HA `dev` matrix leg stays advisory (it tracks an unreleased upstream
  # build), but `stable` and `prev` are required — and the leg being advisory
  # is expressed inside test-integration, not by making the job optional here.
  # ---------------------------------------------------------------------------
  gates:
    name: All Gates Green
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - test-unit
      - test-integration
      - test-companion
      - test-discovery
      - govulncheck
    steps:
      - name: Verify every gate succeeded
        run: |
          declare -A results=(
            [lint]="${{ needs.lint.result }}"
            [test-unit]="${{ needs.test-unit.result }}"
            [test-integration]="${{ needs.test-integration.result }}"
            [test-companion]="${{ needs.test-companion.result }}"
            [test-discovery]="${{ needs.test-discovery.result }}"
            [govulncheck]="${{ needs.govulncheck.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            printf '  %-20s %s\n' "$job" "${results[$job]}"
            if [ "${results[$job]}" != "success" ]; then failed=1; fi
          done
          if [ "$failed" -ne 0 ]; then
            echo
            echo "ERROR: a required gate did not succeed."
            echo "The three Docker tiers (integration, companion, discovery) are"
            echo "mandatory — a green run without them proves nothing about how"
            echo "hactl behaves against a real Home Assistant."
            exit 1
          fi
          echo
          echo "All gates green, every Docker tier included."
