name: Patch Release

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for patch release (optional, shown in tag annotation)"
        required: false
        default: ""

concurrency:
  group: patch-release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  # ---------- Job 0: compute next patch version ----------
  versions:
    name: Compute Patch Version
    runs-on: ubuntu-latest
    outputs:
      next-tag: ${{ steps.calc.outputs.next_tag }}
      next-version: ${{ steps.calc.outputs.next_version }}
      prev-ha-image: ${{ steps.calc.outputs.prev_ha_image }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Calculate next patch version
        id: calc
        run: |
          # Find latest HA-style tag (vYYYY.M.PATCH)
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]{4}\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$latest" ]; then
            echo "::error::No HA-style tag found (vYYYY.M.PATCH). Run auto-release first to establish the baseline."
            exit 1
          fi
          echo "Latest HA-style tag: ${latest}"

          # Parse vYYYY.M.PATCH and increment patch — unless the latest tag is
          # from an earlier month: CalVer means a June patch after a May series
          # starts the June series (vYYYY.M.0), it doesn't extend May's.
          ver=$(echo "$latest" | sed 's/^v//')
          yyyy=$(echo "$ver" | cut -d. -f1)
          m=$(echo "$ver" | cut -d. -f2)
          patch=$(echo "$ver" | cut -d. -f3)
          now_yyyy=$(date -u +%Y)
          now_m=$(date -u +%-m)
          if [ "$yyyy" != "$now_yyyy" ] || [ "$m" != "$now_m" ]; then
            echo "Latest tag ${latest} is from ${yyyy}.${m}; rolling over to ${now_yyyy}.${now_m}.0"
            yyyy=${now_yyyy}
            m=${now_m}
            next_patch=0
          else
            next_patch=$((patch + 1))
          fi
          next_tag="v${yyyy}.${m}.${next_patch}"

          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "next_version=${yyyy}.${m}.${next_patch}" >> "$GITHUB_OUTPUT"

          # Previous month HA version for the test matrix (handles January rollover)
          if [ "$m" -eq 1 ]; then
            prev_year=$((yyyy - 1))
            prev_m=12
          else
            prev_year=${yyyy}
            prev_m=$((m - 1))
          fi
          echo "prev_ha_image=ghcr.io/home-assistant/home-assistant:${prev_year}.${prev_m}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        run: |
          tag="${{ steps.calc.outputs.next_tag }}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists — bump the patch again or check for duplicate runs"
            exit 1
          fi
          echo "Next patch tag: ${tag}"

  # ---------- Job 1: full integration test matrix ----------
  test:
    name: Test (HA ${{ matrix.ha-version }})
    needs: versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ha-version: [stable, prev, dev]
        include:
          - ha-version: stable
            image: ghcr.io/home-assistant/home-assistant:stable
            required: true
          - ha-version: prev
            image: ${{ needs.versions.outputs.prev-ha-image }}
            required: true
          - ha-version: dev
            image: ghcr.io/home-assistant/home-assistant:dev
            required: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run integration tests
        if: matrix.required
        run: make test-int
        env:
          HACTL_HA_IMAGE: ${{ matrix.image }}

      - name: Run integration tests (non-blocking)
        if: '!matrix.required'
        run: |
          if make test-int; then
            echo "::notice::HA dev integration tests passed"
          else
            echo "::warning::HA dev integration tests failed (non-blocking)"
          fi
        env:
          HACTL_HA_IMAGE: ${{ matrix.image }}

      - name: Detect HA version from container
        id: detect
        if: always()
        run: |
          img="${{ matrix.image }}"
          ha_full=$(docker inspect "${img}" --format '{{index .Config.Labels "io.hass.version"}}' 2>/dev/null || true)
          if [ -z "${ha_full}" ]; then
            # Image may not be cached if test failed early — try a quiet pull then re-inspect
            docker pull "${img}" --quiet 2>/dev/null || true
            ha_full=$(docker inspect "${img}" --format '{{index .Config.Labels "io.hass.version"}}' 2>/dev/null || true)
          fi
          if [ -z "${ha_full}" ]; then
            # Final fallback: use the image tag itself
            ha_full=$(echo "${img}" | sed 's|.*/home-assistant:||')
          fi
          echo "ha_version=${ha_full}" >> "$GITHUB_OUTPUT"
          echo "::notice title=HA Version::Tested against Home Assistant ${ha_full}"

      - name: Write version artifact
        if: success()
        run: echo "${{ steps.detect.outputs.ha_version }}" > "ha-version-${{ matrix.ha-version }}.txt"

      - name: Upload version artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ha-version-${{ matrix.ha-version }}
          path: "ha-version-${{ matrix.ha-version }}.txt"

  # ---------- Job 2: tag + goreleaser release ----------
  release:
    name: Release ${{ needs.versions.outputs.next-tag }}
    needs: [versions, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Download version artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ha-version-*
          merge-multiple: true

      - name: Collect tested HA versions
        id: tested
        run: |
          versions=""
          for f in ha-version-*.txt; do
            [ -f "$f" ] || continue
            v=$(cat "$f")
            versions="${versions:+${versions}, }${v}"
          done
          echo "tested_ha=${versions}" >> "$GITHUB_OUTPUT"
          echo "Tested HA versions: ${versions}"

      - name: Create and push tag
        run: |
          tag="${{ needs.versions.outputs.next-tag }}"
          reason="${{ inputs.reason }}"
          msg="Patch release ${tag} (tested: HA ${{ steps.tested.outputs.tested_ha }})"
          if [ -n "$reason" ]; then
            msg="${msg} — ${reason}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "${msg}"
          git push origin "${tag}"

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP: ${{ secrets.HOMEBREW_TAP }}
          TESTED_HA: ${{ steps.tested.outputs.tested_ha }}
