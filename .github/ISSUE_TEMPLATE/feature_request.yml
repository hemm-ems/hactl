name: Feature request
description: Suggest an idea or improvement. Human-written only.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Read this first.**

        🤖 **AI-generated requests are rejected.** ✍️ Human-written ideas are welcome.
        Best of all: prototype it and open a **pull request**.
  - type: textarea
    id: problem
    attributes:
      label: The problem / use case
      description: What are you trying to do? Describe the problem, not just your solution.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like hactl to do?
    validations:
      required: false
  - type: dropdown
    id: pr
    attributes:
      label: Would you (or your AI) send a PR for this?
      options:
        - "Yes — I'll open a PR"
        - "Maybe, with guidance"
        - "No, just suggesting"
    validations:
      required: true
  - type: checkboxes
    id: attestation
    attributes:
      label: Attestation
      options:
        - label: I wrote this request myself. It was not generated by an AI.
          required: true
