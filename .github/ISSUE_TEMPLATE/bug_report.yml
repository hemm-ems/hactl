name: Bug report
description: Something in hactl is broken. Human-written only.
labels: ["bug", "needs-repro"]
body:
  - type: markdown
    attributes:
      value: |
        **Read this first.**

        We live in an AI world: **if your AI can find a bug, it can fix it.** If you (or your
        agent) found a real problem, please open a **pull request** with the fix instead.

        - 🤖 **AI-generated issues are rejected** and closed as invalid.
        - ✍️ **Human-written issues are always welcome** — write it in your own words.
        - The fields below ask for exact versions, the exact command, and the full output.
          That is what lets the maintainer's LLM reproduce and fix it. No repro, no fix.
  - type: input
    id: version
    attributes:
      label: hactl version
      description: Output of `hactl version`.
      placeholder: "2026.6.2"
    validations:
      required: true
  - type: textarea
    id: health
    attributes:
      label: Environment (hactl health)
      description: Paste the relevant part of `hactl health` — HA version, state, companion.
      render: text
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install hactl?
      options:
        - Homebrew
        - go install
        - Prebuilt binary
        - Built from source
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command(s) you ran
      description: Copy-paste, exactly. Redact tokens / URLs if needed.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Full output, including the `[~N tok]` line and any error.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: attestation
    attributes:
      label: Attestation
      options:
        - label: I wrote this issue myself. It was not generated by an AI.
          required: true
        - label: I searched existing issues and this is not a duplicate.
          required: true
