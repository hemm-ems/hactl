# Basic automation test fixture.
#
# These automations exist to be *listed* (auto/ent ls, golden tests), not to
# execute. Triggers are deliberately inert — an event trigger on an event type
# HA never emits — so runs_24h stays deterministically 0. A live-firing trigger
# (e.g. `time_pattern hours: "/1"`) intermittently fired during a test run and
# flaked TestGoldenAutoLs (runs_24h 1 vs golden 0). Conditions/actions are kept
# realistic so reference-scanning tests still have entities to find.
- id: climate_schedule
  alias: Climate Schedule
  description: Manages climate based on time schedule
  trigger:
    - platform: event
      event_type: hactl_test_never_fires
  condition:
    - condition: state
      entity_id: person.owner
      state: home
    - condition: template
      value_template: "{{ states('sensor.outdoor_temp') | float < 20 }}"
  action:
    - service: climate.set_temperature
      target:
        entity_id: climate.living_room
      data:
        temperature: 21
  mode: single

- id: alarm_morning
  alias: Morning Alarm
  description: Turns on lights at alarm time
  trigger:
    - platform: event
      event_type: hactl_test_never_fires
  condition: []
  action:
    - service: light.turn_on
      target:
        entity_id: light.bedroom
      data:
        brightness: 150
  mode: single

- id: vent_boost
  alias: Ventilation Boost
  description: Boosts ventilation on high humidity
  trigger:
    - platform: event
      event_type: hactl_test_never_fires
  condition: []
  action:
    - service: fan.set_percentage
      target:
        entity_id: fan.bathroom_vent
      data:
        percentage: 100
    - delay:
        minutes: 15
    - service: fan.set_percentage
      target:
        entity_id: fan.bathroom_vent
      data:
        percentage: 30
  mode: restart
